<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukar Rupiah - Konversi Mata Uang Indonesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A24;
            --secondary: #1B4332;
            --secondary-light: #2D6A4F;
            --accent: #FFD166;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-input: #21262D;
            --text-primary: #F0F6FC;
            --text-secondary: #8B949E;
            --border: #30363D;
            --success: #3FB950;
            --gold: #D4AF37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(27, 67, 50, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 209, 102, 0.1) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        /* Floating Shapes */
        .floating-shape {
            position: fixed;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            top: 10%;
            left: 5%;
            width: 300px;
            height: 300px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: float1 15s ease-in-out infinite;
        }

        .shape-2 {
            bottom: 15%;
            right: 10%;
            width: 200px;
            height: 200px;
            border: 2px solid var(--secondary);
            transform: rotate(45deg);
            animation: float2 18s ease-in-out infinite;
        }

        .shape-3 {
            top: 60%;
            left: 15%;
            width: 150px;
            height: 150px;
            border: 2px solid var(--accent);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: float3 20s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(50deg) translate(-20px, 30px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 30px) rotate(10deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--bg-dark);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Main Card */
        .converter-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Currency Input Section */
        .currency-section {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: end;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
        }

        .input-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .currency-select-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .currency-select {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            appearance: none;
            transition: all 0.3s ease;
        }

        .currency-select:hover, .currency-select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }

        .currency-select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.75rem;
            pointer-events: none;
        }

        .amount-input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 500;
            pointer-events: none;
        }

        .amount-input {
            width: 100%;
            padding: 20px 20px 20px 50px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .amount-input:hover, .amount-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }

        .amount-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Swap Button */
        .swap-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
            margin-top: 25px;
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5);
        }

        .swap-btn:active {
            transform: rotate(180deg) scale(0.95);
        }

        /* Result Section */
        .result-section {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 209, 102, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .result-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .result-value {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .result-rate {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .rate-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        /* Popular Currencies */
        .popular-section {
            margin-top: 40px;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .currency-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .currency-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .currency-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .currency-card:hover::before {
            opacity: 1;
        }

        .currency-card.active {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.1);
        }

        .currency-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .currency-flag {
            font-size: 2rem;
        }

        .currency-info {
            flex: 1;
        }

        .currency-code {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .currency-name {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .currency-rate {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            position: relative;
            z-index: 1;
        }

        .currency-rate-small {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
        }

        /* Last Updated */
        .last-updated {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Loading State */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .loading .result-value::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Error Message */
        .error-message {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            color: #FF7B72;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .currency-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .swap-btn {
                margin: 10px auto;
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: rotate(270deg) scale(1.1);
            }

            h1 {
                font-size: 2rem;
            }

            .converter-card {
                padding: 25px;
            }

            .result-value {
                font-size: 2.2rem;
            }

            .currency-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Number formatting */
        .formatted-number {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>

            <div class="result-section" id="resultSection">

            <div class="error-message" id="errorMessage">

            MYR: '🇲🇾',
            THB: '🇹🇭',
            AUD: '🇦🇺',
            KRW: '🇰🇷',
            CNY: '🇨🇳',
            HKD: '🇭🇰',
            INR: '🇮🇳',
            PHP: '🇵🇭',
            VND: '🇻🇳'
        };

        // State
        let exchangeRates = {};
        let lastFetchTime = null;
        let isLoading = false;

        // DOM Elements
        const fromCurrency = document.getElementById('fromCurrency');
        const toCurrency = document.getElementById('toCurrency');
        const fromAmount = document.getElementById('fromAmount');
        const toAmount = document.getElementById('toAmount');
        const fromSymbol = document.getElementById('fromSymbol');
        const toSymbol = document.getElementById('toSymbol');
        const resultValue = document.getElementById('resultValue');
        const rateInfo = document.getElementById('rateInfo');
        const swapBtn = document.getElementById('swapBtn');
        const popularGrid = document.getElementById('popularGrid');
        const lastUpdated = document.getElementById('lastUpdated');
        const errorMessage = document.getElementById('errorMessage');
        const resultSection = document.getElementById('resultSection');

        // Format number with commas
        function formatNumber(num, currency) {
            if (currency === 'JPY' || currency === 'KRW' || currency === 'VND') {
                return new Intl.NumberFormat('en-US').format(Math.round(num));
            }
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(num);
        }

        // Parse number from formatted string
        function parseNumber(str) {
            return parseFloat(str.replace(/,/g, '')) || 0;
        }

        // Convert amount using cached rates
        function convert() {
            const from = fromCurrency.value;
            const to = toCurrency.value;
            const amount = parseNumber(fromAmount.value);

            if (!amount || amount === 0) {
                toAmount.value = '';
                resultValue.textContent = '-';
                return;
            }

            // If same currency
            if (from === to) {
                toAmount.value = formatNumber(amount, to);
                resultValue.textContent = `${currencySymbols[to]} ${formatNumber(amount, to)}`;
                rateInfo.textContent = `1 ${from} = 1 ${to}`;
                return;
            }

            // Convert using EUR as base (Frankfurter API uses EUR)
            // exchangeRates[currency] = how many units of currency per 1 EUR
            // e.g., exchangeRates.USD = 1.09 means 1 EUR = 1.09 USD
            if (exchangeRates.EUR && exchangeRates[from] && exchangeRates[to]) {
                // Convert: amount in [from] -> EUR -> [to]
                const amountInEUR = amount / exchangeRates[from];
                const result = amountInEUR * exchangeRates[to];

                toAmount.value = formatNumber(result, to);
                resultValue.textContent = `${currencySymbols[to]} ${formatNumber(result, to)}`;

                const rate = exchangeRates[to] / exchangeRates[from];
                rateInfo.textContent = `1 ${from} = ${formatNumber(rate, to)} ${to}`;
            } else {
                // If IDR rate not available yet, fetch it
                if (!exchangeRates.IDR) {
                    getIDRPerUSD().then(idrPerUsd => {
                        exchangeRates.IDR = exchangeRates.USD * idrPerUsd;
                        convert();
                    });
                } else {
                    fetchExchangeRate(from, to, amount);
                }
            }
        }

        // Fetch exchange rate from Frankfurter API (supports CORS)
        async function fetchExchangeRate(from, to, amount) {
            if (isLoading) return;
            isLoading = true;
            resultSection.classList.add('loading');
            errorMessage.classList.remove('show');

            try {
                const response = await fetch(
                    `https://api.frankfurter.app/latest?from=${from}&to=${to}&amount=${amount || 1}`
                );
                
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                if (data.rates && data.rates[to]) {
                    const result = data.rates[to];
                    const rate = result / (amount || 1);
                    
                    toAmount.value = formatNumber(result, to);
                    resultValue.textContent = `${currencySymbols[to]} ${formatNumber(result, to)}`;
                    rateInfo.textContent = `1 ${from} = ${formatNumber(rate, to)} ${to}`;
                }
            } catch (error) {
                console.error('Error fetching exchange rate:', error);
                errorMessage.classList.add('show');
            } finally {
                isLoading = false;
                resultSection.classList.remove('loading');
            }
        }

        // Fetch all exchange rates from Frankfurter API
        async function fetchAllRates() {
            try {
                // Fetch EUR rates
                const data = await fetchWithRetry('https://api.frankfurter.app/latest?from=EUR');
                
                // Frankfurter returns: base=EUR, so 1 EUR = X units of other currencies
                // Store: how many units of currency per 1 EUR
                exchangeRates = { EUR: 1, ...data.rates };
                
                // Get IDR rate
                const idrData = await fetchWithRetry('https://api.frankfurter.app/latest?from=USD&to=IDR');
                exchangeRates.IDR = idrData.rates.IDR * exchangeRates.USD;
                
                lastFetchTime = new Date();
                updateLastUpdated();
                convert();
                updatePopularCurrencies();
                
            } catch (error) {
                console.error('Error fetching all rates:', error);
                useFallbackRates();
            }
        }

        // Get IDR per USD from Frankfurter (USD as base)
        async function getIDRPerUSD() {
            try {
                const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=IDR');
                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                return data.rates.IDR || 16500;
            } catch {
                return 16500; // fallback
            }
        }

        // Fetch with retry
        async function fetchWithRetry(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) return await response.json();
                    if (i === retries - 1) throw new Error('Failed after retries');
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        // Fallback rates (EUR as base - 1 EUR = X units of currency)
        function useFallbackRates() {
            exchangeRates = {
                EUR: 1,
                USD: 1.09,
                GBP: 0.86,
                JPY: 163,
                SGD: 1.47,
                MYR: 5.1,
                THB: 38.5,
                AUD: 1.67,
                KRW: 1450,
                CNY: 7.85,
                HKD: 8.52,
                INR: 91,
                PHP: 62,
                VND: 25000,
                IDR: 17000  // 1 EUR = 17000 IDR
            };
            lastFetchTime = new Date();
            updateLastUpdated();
            convert();
            updatePopularCurrencies();
        }

        // Update popular currencies grid
        function updatePopularCurrencies() {
            const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'SGD', 'MYR', 'AUD', 'CNY'];
            
            popularGrid.innerHTML = currencies.map(currency => {
                // Calculate IDR rate per 1 unit of currency
                // Frankfurter: if EUR=1, then IDR rate = exchangeRates[currency] / exchangeRates.IDR
                let rate;
                if (currency === 'IDR') {
                    rate = 1;
                } else if (exchangeRates[currency] && exchangeRates.IDR) {
                    // How many IDR per 1 unit of currency
                    rate = exchangeRates[currency] / exchangeRates.IDR;
                } else if (exchangeRates[currency]) {
                    rate = exchangeRates[currency];
                } else {
                    rate = 17000; // Fallback IDR rate
                }

                const isActive = toCurrency.value === currency;

                return `
                    <div class="currency-card ${isActive ? 'active' : ''}" data-currency="${currency}">
                        <div class="currency-card-header">
                            <span class="currency-flag">${currencyFlags[currency]}</span>
                            <div class="currency-info">
                                <div class="currency-code">${currency}</div>
                                <div class="currency-name">${currencyNames[currency]}</div>
                            </div>
                        </div>
                        <div class="currency-rate">
                            Rp ${formatNumber(rate, 'IDR')}
                            <span class="currency-rate-small">/ ${currency}</span>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click handlers
            document.querySelectorAll('.currency-card').forEach(card => {
                card.addEventListener('click', () => {
                    toCurrency.value = card.dataset.currency;
                    updateSymbol();
                    convert();
                    updatePopularCurrencies();
                });
            });
        }

        // Update currency symbol
        function updateSymbol() {
            fromSymbol.textContent = currencySymbols[fromCurrency.value];
            toSymbol.textContent = currencySymbols[toCurrency.value];
        }

        // Update last updated text with real-time clock
        function updateLastUpdated() {
            const now = new Date();
            const options = { 
                weekday: 'long',
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZoneName: 'short'
            };
            
            lastUpdated.innerHTML = `
                <span>📅</span>
                <span>Update: ${now.toLocaleString('id-ID', options)}</span>
                <span class="live-badge" style="margin-left: 10px; font-size: 0.75rem;">
                    <span class="live-dot"></span>
                    LIVE
                </span>
            `;
        }

        // Check if forex market is open (Mon-Fri, 00:00-23:00 WIB)
        function isForexMarketOpen() {
            const now = new Date();
            // Convert to WIB (UTC+7)
            const wibTime = new Date(now.getTime() + (7 * 60 * 60 * 1000));
            const day = wibTime.getUTCDay();
            const hour = wibTime.getUTCHours();
            
            // Market open: Monday(1) to Friday(5), hour 00-22 WIB
            const isWeekday = day >= 1 && day <= 5;
            const isMarketHours = hour >= 0 && hour < 23;
            
            return isWeekday && isMarketHours;
        }

        // Real-time clock in header
        function updateRealtimeClock() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const timeOptions = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const dateStr = now.toLocaleDateString('id-ID', options);
            const timeStr = now.toLocaleTimeString('id-ID', timeOptions);
            const marketOpen = isForexMarketOpen();
            
            const marketStatus = marketOpen 
                ? '<span style="background: rgba(63, 185, 80, 0.2); color: #3FB950; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 10px;">🏛️ PASAR TERSEDIA</span>'
                : '<span style="background: rgba(248, 81, 73, 0.2); color: #FF7B72; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 10px;">🌙 PASAR TUTUP</span>';
            
            document.getElementById('realtime-clock').innerHTML = `
                <span style="color: var(--accent);">${dateStr}</span>
                <span style="margin-left: 15px; color: var(--primary); font-family: 'Playfair Display', serif; font-size: 1.4rem;">⏰ ${timeStr}</span>
                ${marketStatus}
            `;
        }

        // Update clock every second
        setInterval(updateRealtimeClock, 1000);
        updateRealtimeClock(); // Initial call
        setInterval(updateLastUpdated, 1000);
        updateLastUpdated(); // Initial call

        // Swap currencies
        function swapCurrencies() {
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
            
            // Swap amounts too
            const tempAmount = fromAmount.value;
            fromAmount.value = toAmount.value;
            toAmount.value = tempAmount;
            
            updateSymbol();
            convert();
            updatePopularCurrencies();
        }

        // Event Listeners
        fromCurrency.addEventListener('change', () => {
            updateSymbol();
            convert();
            updatePopularCurrencies();
        });

        toCurrency.addEventListener('change', () => {
            updateSymbol();
            convert();
            updatePopularCurrencies();
        });

        fromAmount.addEventListener('input', () => {
            convert();
        });

        fromAmount.addEventListener('keypress', (e) => {
            // Only allow numbers and dots
            if (!/[0-9.]/.test(e.key)) {
                e.preventDefault();
            }
        });

        fromAmount.addEventListener('blur', () => {
            const amount = parseNumber(fromAmount.value);
            if (amount > 0) {
                fromAmount.value = formatNumber(amount, fromCurrency.value);
            }
        });

        swapBtn.addEventListener('click', swapCurrencies);

        // Auto-refresh rates every 5 minutes
        setInterval(fetchAllRates, 5 * 60 * 1000);

        // Initialize
        updateSymbol();
        fetchAllRates();
    </script>
</body>
</html>
